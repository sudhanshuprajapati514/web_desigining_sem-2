<!DOCTYPE html>
<html lang="en">
<head>
    <title>DOM Manipulation</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            transition: 0.3s;
        }

        .container {
            margin-top: 50px;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        #para {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1 id="heading">Welcome to JavaScript</h1>

    <p id="para">This is a paragraph. You can show/hide me!</p>

    <input type="text" id="inputText" placeholder="Enter new heading text">

    <br><br>

    <button id="changeText">Change Heading</button>
    <button id="bgColor">Change Background</button>
    <button id="increaseFont">Increase Font Size</button>
    <button id="togglePara">Show/Hide Paragraph</button>
</div>

<script src="exp 6.js"></script>

</body>
</html>
